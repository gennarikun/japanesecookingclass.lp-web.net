<script type="text/javascript">
document.addEventListener('DOMContentLoaded', () => {
	const modal = document.getElementById("lpReviewModal");
	const modalImg = document.getElementById("lpModalImg");
	const images = document.querySelectorAll(".lp-review-screenshot");
	const closeBtn = document.querySelector(".lp-modal-close");

	// 要素が足りない場合は処理しない
	if (!modal || !modalImg || !closeBtn) return;

	// 画像クリックでモーダルを開く
	images.forEach((img) => {
		img.addEventListener('click', (e) => {
			modal.style.display = "flex";
			modal.style.alignItems = "center";
			modal.style.justifyContent = "center";
			modalImg.src = e.target.src;
		});
	});

	const closeModal = () => {
		modal.style.display = "none";
	};

	// 閉じる操作のイベントリスナー
	closeBtn.addEventListener('click', closeModal);

	modal.addEventListener('click', (e) => {
		if (e.target === modal) {
			closeModal();
		}
	});

	// 画像自体をクリックしても閉じる
	modalImg.addEventListener('click', closeModal);
});</script>
